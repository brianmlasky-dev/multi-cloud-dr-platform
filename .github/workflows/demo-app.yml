name: Demo App CI

on:
  push:
    branches: [ main ]
    paths:
      - 'app/**'
      - 'scripts/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'app/**'
      - 'scripts/**'

jobs:
  test-app:
    name: Test Demo App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: app
        run: pip install --require-hashes -r requirements.txt

      - name: Install dev dependencies
        working-directory: app
        run: pip install --require-hashes -r requirements-dev.txt

      - name: Run unit tests with coverage
        working-directory: app
        run: |
          python -m pytest tests/ -v \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: app/coverage.xml
          flags: unittests
          fail_ci_if_error: false

      - name: Run app health check
        working-directory: app
        run: |
          gunicorn --bind 0.0.0.0:8080 --workers 2 --timeout 60 app:app &
          sleep 5
          curl -f http://localhost:8080/health && echo "Health check passed!"
          curl -f http://localhost:8080/status && echo "Status check passed!"
          curl -f http://localhost:8080/metrics && echo "Metrics check passed!"

  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test-app
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        working-directory: app
        run: |
          docker build -t crestline-dr-app:latest .
          echo "Docker build successful!"

      - name: Test Docker container
        run: |
          docker run -d -p 8080:8080 --name test-app crestline-dr-app:latest
          sleep 5
          curl -f http://localhost:8080/health && echo "Docker health check passed!"
          docker stop test-app

      - name: Run Trivy container scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: crestline-dr-app:latest
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: '1'

      - name: Upload Trivy SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

  test-scripts:
    name: BATS Shell Script Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install BATS
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y bats

      - name: Run BATS tests
        run: bats scripts/tests/
