name: Demo App CI

on:
  push:
    branches: [ main ]
    paths:
      - 'app/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'app/**'

jobs:
  test-app:
    name: Test Demo App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: app
        run: pip install -r requirements.txt

      - name: Run app health check
        working-directory: app
        run: |
          python app.py &
          sleep 3
          curl -f http://localhost:8080/health && echo "Health check passed!"
          curl -f http://localhost:8080/status && echo "Status check passed!"
          curl -f http://localhost:8080/metrics && echo "Metrics check passed!"

  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test-app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        working-directory: app
        run: |
          docker build -t northstar-dr-app:latest .
          echo "Docker build successful!"

      - name: Test Docker container
        run: |
          docker run -d -p 8080:8080 --name test-app northstar-dr-app:latest
          sleep 5
          curl -f http://localhost:8080/health && echo "Docker health check passed!"
          docker stop test-app
