name: Terraform Validate & Plan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  terraform-aws:
    name: Validate AWS Terraform
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0

      - name: Terraform Format Check (AWS)
        working-directory: infrastructure/aws
        run: terraform fmt -check -recursive

      - name: Terraform Init (AWS)
        working-directory: infrastructure/aws
        run: terraform init -backend=false

      - name: Terraform Validate (AWS)
        working-directory: infrastructure/aws
        run: terraform validate

      - name: Terraform Plan (AWS)
        working-directory: infrastructure/aws
        run: |
          terraform plan \
            -backend=false \
            -input=false \
            -var="db_username=ci_placeholder" \
            -var="db_password=ci_placeholder"

  terraform-gcp:
    name: Validate GCP Terraform
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0

      - name: Terraform Format Check (GCP)
        working-directory: infrastructure/gcp
        run: terraform fmt -check -recursive

      - name: Terraform Init (GCP)
        working-directory: infrastructure/gcp
        run: terraform init -backend=false

      - name: Terraform Validate (GCP)
        working-directory: infrastructure/gcp
        run: terraform validate

      - name: Terraform Plan (GCP)
        working-directory: infrastructure/gcp
        run: |
          terraform plan \
            -backend=false \
            -input=false \
            -var="db_username=ci_placeholder" \
            -var="db_password=ci_placeholder"

  terraform-security:
    name: Validate Security Module
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0

      - name: Terraform Init (Security)
        working-directory: infrastructure/security
        run: terraform init -backend=false

      - name: Terraform Validate (Security)
        working-directory: infrastructure/security
        run: terraform validate

  terraform-monitoring:
    name: Validate Monitoring Module
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0

      - name: Terraform Init (Monitoring)
        working-directory: infrastructure/monitoring
        run: terraform init -backend=false

      - name: Terraform Validate (Monitoring)
        working-directory: infrastructure/monitoring
        run: terraform validate

  notify:
    name: Notify Status
    runs-on: ubuntu-latest
    needs: [terraform-aws, terraform-gcp, terraform-security, terraform-monitoring]
    if: always()

    steps:
      - name: Success Notice
        if: needs.terraform-aws.result == 'success' && needs.terraform-gcp.result == 'success' && needs.terraform-security.result == 'success' && needs.terraform-monitoring.result == 'success'
        run: echo "All Terraform configs are valid!"

      - name: Failure Notice
        if: needs.terraform-aws.result == 'failure' || needs.terraform-gcp.result == 'failure' || needs.terraform-security.result == 'failure' || needs.terraform-monitoring.result == 'failure'
        run: echo "Terraform validation failed! Check the logs." && exit 1
