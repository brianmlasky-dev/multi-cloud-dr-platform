name: Terraform Validate & Plan

on:
  push:
    branches: [ "main" ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-aws:
    name: Validate AWS Terraform
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Terraform Init (AWS)
        working-directory: ./infrastructure/aws
        run: terraform init -backend=false
      - name: Terraform Format Check
        working-directory: ./infrastructure/aws
        run: terraform fmt -check -recursive
      - name: Terraform Validate
        working-directory: ./infrastructure/aws
        run: terraform validate

  validate-gcp:
    name: Validate GCP Terraform
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Terraform Init (GCP)
        working-directory: ./infrastructure/gcp
        run: terraform init -backend=false
      - name: Terraform Format Check
        working-directory: ./infrastructure/gcp
        run: terraform fmt -check -recursive
      - name: Terraform Validate
        working-directory: ./infrastructure/gcp
        run: terraform validate

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [validate-aws, validate-gcp]
    continue-on-error: true
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - name: Checkov
        continue-on-error: true
        run: |
          pip install checkov
          checkov -d . --soft-fail
      - name: TFSec
        continue-on-error: true
        run: |
          curl -s https://raw.githubusercontent.com/aquasecurity/tfsec/master/scripts/install_linux.sh | bash
          tfsec .
      - name: Trivy
        continue-on-error: true
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy
          trivy config .

  notify:
    name: Notify Status
    runs-on: ubuntu-latest
    needs: [validate-aws, validate-gcp, security-scan]
    if: always()
    steps:
      - run: echo "Terraform workflow completed"
