# ─────────────────────────────────────────
# AWS EKS Deployment - Crestline Financial
# ─────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: crestline-app
  namespace: production
  labels:
    app: crestline-app
    environment: production
    managed-by: terraform
    owner: brian-m-lasky
spec:
  replicas: 2
  selector:
    matchLabels:
      app: crestline-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: crestline-app
        environment: production
    spec:
      containers:
        - name: crestline-app
          image: nginx:1.27.4
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          env:
            - name: ENVIRONMENT
              value: "production"
            - name: CLOUD_PROVIDER
              value: "aws"
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: host
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: password
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: crestline-app
