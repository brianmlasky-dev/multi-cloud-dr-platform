# ─────────────────────────────────────────
# AWS EKS NetworkPolicy - Crestline Financial
# Deny all traffic by default; allow only from ingress controller
# ─────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: crestline-app-network-policy
  namespace: production
spec:
  podSelector:
    matchLabels:
      app: crestline-app
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
          podSelector:
            matchLabels:
              app.kubernetes.io/name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8080
  egress:
    # Allow DNS resolution
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow outbound to RDS (PostgreSQL)
    - ports:
        - protocol: TCP
          port: 5432
    # Allow HTTPS to external services (e.g., Secrets Manager)
    - ports:
        - protocol: TCP
          port: 443
