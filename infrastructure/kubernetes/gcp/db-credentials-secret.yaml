# ─────────────────────────────────────────
# GCP GKE - db-credentials Secret Template
#
# In production, use the External Secrets Operator to sync credentials
# directly from GCP Secret Manager instead of managing this file.
# See: https://external-secrets.io/latest/provider/google-secrets-manager/
#
# Quick-start (for development only — never commit real credentials):
#   kubectl create secret generic db-credentials \
#     --namespace=production \
#     --from-literal=host=<CLOUD_SQL_PRIVATE_IP> \
#     --from-literal=password=<DB_PASSWORD>
# ─────────────────────────────────────────
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: db-credentials
  namespace: production
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secrets-manager
    kind: ClusterSecretStore
  target:
    name: db-credentials
    creationPolicy: Owner
  data:
    - secretKey: host
      remoteRef:
        key: multi-cloud-dr-db-host
    - secretKey: password
      remoteRef:
        key: multi-cloud-dr-db-password
