# ─────────────────────────────────────────
# GCP GKE Deployment - Northstar Commerce
# ─────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: northstar-app
  namespace: production
  labels:
    app: northstar-app
    environment: production
    managed-by: terraform
    owner: brian-m-lasky
spec:
  replicas: 0
  selector:
    matchLabels:
      app: northstar-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: northstar-app
        environment: production
    spec:
      containers:
        - name: northstar-app
          image: nginx:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          env:
            - name: ENVIRONMENT
              value: "production"
            - name: CLOUD_PROVIDER
              value: "gcp"
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: host
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: password
