# ─────────────────────────────────────────
# GCP GKE NetworkPolicy - Crestline Financial
# Deny all traffic by default; allow only from ingress controller
# ─────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: crestline-app-network-policy
  namespace: production
spec:
  podSelector:
    matchLabels:
      app: crestline-app
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-gce
          podSelector:
            matchLabels:
              app: ingress-gce
      ports:
        - protocol: TCP
          port: 80
  egress:
    # Allow DNS resolution
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow outbound to Cloud SQL (PostgreSQL)
    - ports:
        - protocol: TCP
          port: 5432
    # Allow HTTPS to external services (e.g., Secret Manager)
    - ports:
        - protocol: TCP
          port: 443
