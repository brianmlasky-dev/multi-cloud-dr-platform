# ─────────────────────────────────────────
# GCP GKE Service - Crestline Financial
# ─────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: crestline-app-service
  namespace: production
  labels:
    app: crestline-app
  annotations:
    cloud.google.com/load-balancer-type: "External"
    cloud.google.com/neg: '{"ingress": true}'
spec:
  selector:
    app: crestline-app
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8080
  type: LoadBalancer
---
# NOTE: Standard HPA cannot scale to/from zero. For event-driven scale-to-zero on GKE
# (pilot light standby), use KEDA (Kubernetes Event-Driven Autoscaling). During failover,
# the failover automation sets replicas >= 1, after which KEDA handles auto-scaling.
# See: https://keda.sh/
#
# When the standby is activated (replicas > 0), re-apply this manifest with a KEDA
# ScaledObject, or use kubectl scale deployment crestline-app --replicas=<N>.
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: crestline-app-pdb
  namespace: production
spec:
  # maxUnavailable rather than minAvailable so the PDB does not block node drains
  # when the standby is at zero replicas.
  maxUnavailable: 1
  selector:
    matchLabels:
      app: crestline-app
