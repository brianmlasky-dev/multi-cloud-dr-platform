# ─────────────────────────────────────────
# GCP GKE Service - Crestline Financial
# ─────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: crestline-app-service
  namespace: production
  labels:
    app: crestline-app
  annotations:
    cloud.google.com/load-balancer-type: "External"
    cloud.google.com/neg: '{"ingress": true}'
spec:
  selector:
    app: crestline-app
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8080
  type: LoadBalancer
---
# NOTE: Standard HPA is incompatible with scale-to-zero (replicas: 0) in the pilot light
# standby pattern. For event-driven scale-to-zero on GKE, use KEDA (Kubernetes Event-Driven
# Autoscaling). During failover, the failover automation scales the deployment to >= 1 replica,
# after which this HPA takes over to auto-scale based on load.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: crestline-app-hpa
  namespace: production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: crestline-app
  minReplicas: 1
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: crestline-app-pdb
  namespace: production
spec:
  # maxUnavailable rather than minAvailable so the PDB does not block node drains
  # when the standby is at zero replicas.
  maxUnavailable: 1
  selector:
    matchLabels:
      app: crestline-app
